manifestVersion: 1
id: hiverelay-blindspark
category: networking
name: Blindspark
version: "0.16.3"
tagline: A blind relay that keeps peer-to-peer apps online
description: >-
  Blindspark turns your Umbrel into a blind relay for the Pear / Holepunch
  peer-to-peer app ecosystem. It seeds encrypted Hyperdrives — data the
  relay can verify and serve but cannot read — so the apps people build on
  Pear stay reachable even when their authors and users are offline.


  Why run it:

   - Keep decentralized apps available. A peer-to-peer app is only as
     reachable as the peers hosting its data. Blindspark is an always-on
     peer that holds and serves that data on demand, so apps don't vanish
     the moment their users close their laptops.

   - Power blind social recovery. Blindspark can hold encrypted recovery
     shares for the Atomic Blind Custody protocol, letting people recover
     keys and identities through their social graph — without any single
     party (this relay included) ever seeing the secret.


  How it stays blind:

   - Content is end-to-end encrypted between publisher and consumer over
     Hypercore's Noise transport. The relay holds ciphertext blocks and
     Merkle proofs, never plaintext. It proves the data is well-formed and
     serves it to authorized peers; it cannot decrypt what it carries.

   - Operator-untrusted by design. Even you, running the box, cannot read
     the content your relay stores.


  Setup is quick:

   1. Install from the App Store.

   2. Open the dashboard. A short first-run wizard names your relay and
      lets you choose how it accepts seed requests — review each one, use
      an allowlist, or run open.

   3. That's it. The relay joins the network and starts holding data.


  Notes:

   - The relay is reached only through Umbrel's authenticated app proxy;
     it does not expose a management port to your network.

   - Persistent state lives in the app's data volume and survives
     reinstalls — the relay's identity is derived from your Umbrel seed.

   - Open source, Apache-2.0. No account, no telemetry, no payment.
developer: HiveRelay
website: https://github.com/bigdestiny2/p2p-hiverelay
dependencies: []
repo: https://github.com/bigdestiny2/p2p-hiverelay
support: https://github.com/bigdestiny2/p2p-hiverelay/issues
port: 9100
# Community stores: umbrelOS only honors an explicit icon: URL (it does NOT
# read icon.svg from the repo — it would otherwise fall back to the official
# gallery CDN by app id, which 404s for community apps). Served via jsDelivr
# so the SVG gets a correct image/svg+xml content-type (raw.githubusercontent
# serves .svg as text/plain, which <img> won't render).
icon: https://cdn.jsdelivr.net/gh/bigdestiny2/blindspark-umbrel-store@main/hiverelay-blindspark/icon.svg
gallery:
  - https://cdn.jsdelivr.net/gh/bigdestiny2/blindspark-umbrel-store@main/hiverelay-blindspark/1.png
  - https://cdn.jsdelivr.net/gh/bigdestiny2/blindspark-umbrel-store@main/hiverelay-blindspark/2.png
  - https://cdn.jsdelivr.net/gh/bigdestiny2/blindspark-umbrel-store@main/hiverelay-blindspark/3.png
path: ""
defaultUsername: ""
defaultPassword: ""
releaseNotes: >-
  Simpler, one-page dashboard. Blindspark now shows a single clean screen —
  your relay's name and key, live status, connected peers, and how much
  encrypted data it's holding (with disk-usage headroom) — instead of the
  full multi-tab operator console. This update also fixes the status badge so
  a running relay with no peers yet reads "Degraded", not "Offline", and
  reports stored bytes accurately. Same blind relay underneath; just less to
  wade through on a home server.
submitter: bigdestiny2
